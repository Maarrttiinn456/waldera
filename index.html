<!doctype html>
<html lang="cs" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Waldera</title>

        <!-- Tailwind v4 (compiled) -->
        <link rel="stylesheet" href="css/output.css" />

        <!-- AOS -->
        <link rel="stylesheet" href="css/aos.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="bg-industry-navy">
            <div class="container">
                <div class="flex justify-between items-center py-4">
                    <div>
                        <img class="w-48" src="./assets/logo/Weldera_logo_black.svg" alt="" />
                    </div>
                    <div class="hidden md:flex items-center gap-8">
                        <a href="#sluzby" class="nav-link">Služby</a>
                        <a href="#o-nas" class="nav-link">O nás</a>
                        <a href="#projekty" class="nav-link">Projekty</a>
                        <a href="#kariera" class="nav-link">Kariéra</a>
                        <a href="#kontakt" class="btn-primary">Kontakt</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="bg-industry-navy">
            <div class="container py-20">
                <div class="grid grid-cols-2">
                    <div class="self-center">
                        <h1 class="text-white">
                            Svařujeme <span class="text-tech-lila">budoucnost</span> <br />
                            z oceli.
                        </h1>
                        <p class="text-white/60 max-w-md my-6">
                            Weldera je česká strojírenská firma specializující se na laserové
                            řezání, přesné ohýbání a certifikované svařování ocelových konstrukcí.
                        </p>
                        <div class="flex gap-4">
                            <a href="#kontakt" class="btn-primary block">Naše služby</a>
                            <a href="#kontakt" class="btn-outline block">Kontaktujte nás</a>
                        </div>
                    </div>
                    <div>
                        <img
                            class="aspect-square object-cover"
                            src="./assets/images/DSC_4644.jpg"
                            alt=""
                        />
                    </div>
                </div>
            </div>
        </section>

        <!-- AOS init -->
        <script src="js/aos.js"></script>
        <script>
            AOS.init({
                duration: 700,
                once: true,
            });
        </script>

        <!-- Alpine.js (musí být poslední) -->
        <script defer src="js/alpine.min.js"></script>
    </body>
</html>
